version: "3.9"

services:
  case-provider:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CASE_DATA_DIR=/app/data
      - PORT=8080
      - JWT_PUBLIC_KEY=changeme
      - JWT_ISSUER=example-issuer
      - JWT_AUDIENCE=example-audience
    volumes:
      - ./data:/app/data:ro

